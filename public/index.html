    <style media="screen">
      *{
        box-sizing: border-box;
      }
      html{height: 100%;}
      body { 
        background:#00141B; 
        color: #FFFAEF;
        font-family: 'Poppins', Helvetica, Arial, sans-serif; 
        margin: 0; 
        padding: 0; 
        min-height:100%;
      }
      h1 { font-size: 45px; font-weight: 100; color: inherit; margin: 0 0 1em;}
      h2 { color: inherit; font-weight: 400; font-size: 30px; margin: 0 0 1em; }
      p { line-height: 1.4; margin: 0 0 8px; font-size: 14px;color: inherit }
      a { display: inline-block;}
      /* svg {width: 100%;} */
      img {
        width: 100%;
      }
      .main {
        display: flex;
        width:100%;
        height: 100%; 
        align-items: center;
        justify-content: center;
        text-align: center; 
      }
      .content_wrapper{
        display: flex;
        width: 100%;
        max-width: 1400px;
      }
      .content {
        width: 100%;
        max-width: 780px;
        padding-top: 100px;
      }

      .header {
        display: flex;
        justify-content: center;
        padding:.5em 1em;
        box-shadow: 
        inset 0 0 0.5px 1px hsla(0, 0%,100%, 0.075), 
              0 0.3px 0.4px hsla(0, 0%, 0%, 0.02), 
              0 0.9px 1.5px hsla(0, 0%, 0%, 0.045), 
              0 3.5px 6px hsla(0, 0%, 0%, 0.09);
      }
      .wrapper__header{
        justify-content: space-between;
        align-items: center;
      }
      .header__logo {
        display: flex;
        fill: #FFFDF4;
      }  
      .content_section {
        max-width: 520px;
        margin: auto;
        padding: 10px;
      }
      .brand__tagline {
        margin-bottom: .5rem;
      }
      .whatsapp__box {
        position: relative;
        background: #ffffff;
        border-radius: 20px;
        text-align: center;
        color: #00141B;
        padding: 3rem 2rem;
        margin:50px auto;
        max-width: 420px;
        max-height: 420px;
        box-sizing: border-box;
        box-shadow: inset 0 0 0.5px 1px hsla(0, 0%,  
              100%, 0.075),
              /* shadow ring 👇 */
              0 0 0 1px hsla(0, 0%, 0%, 0.05),
              /* multiple soft shadows 👇 */
              0 0.3px 0.4px hsla(0, 0%, 0%, 0.02),
              0 0.9px 1.5px hsla(0, 0%, 0%, 0.045),
              0 3.5px 6px hsla(0, 0%, 0%, 0.09);
      }
      .whatsapp__box:before {
        content: '';
        background: #ffffff url('./images/join-in_logo.jpg') center/contain; 
        display: block;
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 100px;
        top: 0;
        left: 50%;
        margin: -50px 0 0 -50px;
      }
      .whatsapp__content{
        max-width: 320px;
        margin: auto;
      }
      .whatsapp__p {
          color: #919090;
          margin-bottom: 1rem;
      }
      .whatsapp__qr {
          max-width: 200px;
          margin: auto;
      }
      /* --- Light mode ---*/
      @media (prefers-color-scheme:light) {
        body{
          background: #FFFAEF;
          color:#00141B;
        }
        .header__logo {
          fill:#00141B;
        }
      }
      /* --- mobile ---*/
      @media (max-width: 1024px) {
        h1 { font-size: 32px;} 
        h2 { font-size: 26px;} 
        .whatsapp__box {
          scale: 0.8;
        }
      }
      @media (max-width: 800px) {
        .content_wrapper {
          flex-direction: column;
        }
        .content {
          display: flex;
          padding: 0;
        }
        .content_section {
          width: 50%;
        }
        .whatsapp__box {
          scale: 0.9;
        }
        .image__apps {
          max-width: 300px;
          margin: auto;
        }
      }
      @media (max-width: 600px) {
        .content_wrapper {
          flex-direction: column-reverse;
        }
        .content {
          flex-direction: column;
        }
        .content_section {
          width: 100%;
        }
        .content__right {
          display: block;
        }
        .image__apps {
          max-width: 300px;
        }
      }
  </style>
