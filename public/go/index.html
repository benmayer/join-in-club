<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join in — sports with friends</title>
    <meta name="description" content="Get the app to join activities with friends and meet new people through sports.">
    <meta property="og:title" content="Join in — sports with friends">
    <meta property="og:description" content="Someone invited you to join an activity. Get the Join in app to connect and play.">
    <meta property="og:image" content="https://joinin.club/images/join-in_logo.jpg">
    <meta property="og:url" content="https://joinin.club">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;700&display=swap" rel="stylesheet">

    <style>
      html {
        height: 100%;
      }

      body {
        background: #00141B;
        color: #FFFAEF;
        font-family: 'Poppins', Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      .wrapper {
        display: flex;
        width: 100%;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }

      .content {
        width: 100%;
        max-width: 520px;
      }

      h1 {
        font-size: 28px;
        font-weight: 400;
        color: inherit;
        margin: 0 0 1rem 0;
        line-height: 1.2;
      }

      p {
        font-size: 16px;
        line-height: 1.5;
        color: inherit;
        margin: 0 0 1.5rem 0;
      }

      .logo-section {
        margin: 0 0 2rem 0;
      }

      .logo-section img {
        max-width: 120px;
        height: auto;
        margin: 0 auto;
        display: block;
      }

      .headline-section {
        margin: 2rem 0 1.5rem 0;
      }

      .tagline {
        font-size: 14px;
        color: #B8B8B8;
        margin: 0.5rem 0 0 0;
      }

      .cta-section {
        margin: 2.5rem 0;
      }

      .app-button {
        display: inline-block;
        background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%);
        color: white;
        padding: 16px 40px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: 700;
        font-size: 16px;
        border: none;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
      }

      .app-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
      }

      .app-button:active {
        transform: translateY(0);
      }

      .qr-section {
        margin: 2.5rem 0 0 0;
      }

      .qr-container {
        display: inline-block;
        margin: 0 auto;
      }

      .qr-image {
        max-width: 200px;
        height: auto;
        border-radius: 8px;
      }

      .qr-caption {
        font-size: 12px;
        color: #B8B8B8;
        margin-top: 0.75rem;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 24px;
        }

        p {
          font-size: 14px;
        }

        .app-button {
          padding: 14px 32px;
          font-size: 15px;
        }

        .logo-section img {
          max-width: 100px;
        }

        .qr-image {
          max-width: 160px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="content">
        <div class="logo-section">
          <img src="/images/join-in_logo.jpg" alt="Join in logo">
        </div>

        <div class="headline-section">
          <h1>Someone invited you on Join in</h1>
          <p class="tagline">Get the app to join the activity.</p>
        </div>

        <div class="cta-section">
          <a href="https://apps.apple.com/app/id6772954838" class="app-button">Get the app</a>
        </div>

        <div class="qr-section">
          <div class="qr-container">
            <img src="/images/join-in_qr_code.png" alt="QR code to download Join in" class="qr-image">
            <p class="qr-caption">Scan to download</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Attempt deep linking if the app is installed
      window.addEventListener('load', function() {
        const pathname = window.location.pathname;
        const deepLinkPattern = /^\/(session|user|place)\/[A-Za-z0-9\-]+$/;

        if (deepLinkPattern.test(pathname)) {
          // Record click for deferred deep linking after App Store install
          if (/(iPhone|iPad|iPod)/.test(navigator.userAgent)) {
            fetch('https://ihgoxnqehjnvsssciqie.supabase.co/functions/v1/link-click', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              keepalive: true,
              body: JSON.stringify({
                path: pathname,
                signals: {
                  platform: 'ios',
                  tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                  lang: navigator.language,
                  os_major: (function () { var m = navigator.userAgent.match(/OS (\d+)_/); return m ? parseInt(m[1], 10) : null; })(),
                  screen_w: Math.min(screen.width, screen.height),
                  screen_h: Math.max(screen.width, screen.height)
                }
              })
            }).catch(function () {})
          }

          const deepLinkUrl = 'joinin://' + pathname.substring(1);
          window.location.href = deepLinkUrl;

          // Fallback: if the user is still on this page after a short delay,
          // the app is not installed. Keep the page visible for manual action.
        }
      });
    </script>
  </body>
</html>
